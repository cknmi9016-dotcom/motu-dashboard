<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 키오리 모투 대시보드</title>
<style>
  :root {
    --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#999;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
    --radius:10px;--radius-sm:7px;
    --green:#3B6D11;--green-bg:#EAF3DE;
    --red:#A32D2D;--red-bg:#FCEBEB;
    --blue:#185FA5;--blue-bg:#E6F1FB;
    --amber:#854F0B;--amber-bg:#FAEEDA;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --green:#97C459;--green-bg:#173404;
    --red:#F09595;--red-bg:#501313;
    --blue:#85B7EB;--blue-bg:#042C53;
    --amber:#EF9F27;--amber-bg:#412402;
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
  .container{max-width:980px;margin:0 auto;padding:1.5rem 1rem 5rem}
  .top-banner{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 20px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .phase{font-size:16px;font-weight:500;color:var(--green)}
  .phase-sub{font-size:12px;color:var(--text2);margin-top:3px}
  .update-info{text-align:right;font-size:11px;color:var(--text3)}
  .section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin:1.2rem 0 .5rem}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
  @media(max-width:640px){.grid4{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
  .metric-val{font-size:20px;font-weight:500}
  .metric-chg{font-size:12px;margin-top:3px}
  .up{color:var(--red)}.dn{color:var(--blue)}.neutral{color:var(--text2)}
  .warn-txt{color:var(--amber);font-size:11px;margin-top:3px}
  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
  .badge-buy{background:var(--green-bg);color:var(--green)}
  .badge-hold{background:var(--amber-bg);color:var(--amber)}
  .badge-wait{background:var(--red-bg);color:var(--red)}
  .badge-cash{background:var(--blue-bg);color:var(--blue)}
  .etf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:700px){.etf-grid{grid-template-columns:repeat(2,1fr)}}
  .etf-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px}
  .etf-name{font-size:13px;font-weight:500;margin-bottom:2px}
  .etf-index{font-size:10px;color:var(--text3);margin-bottom:10px}
  .etf-price{font-size:18px;font-weight:500}
  .etf-chg{font-size:12px;margin-top:2px;margin-bottom:10px}
  .etf-action{margin-top:8px}
  .etf-opinion{font-size:11px;color:var(--text2);line-height:1.5;border-top:0.5px solid var(--border);padding-top:8px;margin-top:8px}
  .issue-card{border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:8px;border-left:3px solid;background:var(--bg2)}
  .issue-title{font-size:13px;font-weight:500}
  .issue-impact{font-size:11px;margin-top:4px;color:var(--text2);line-height:1.5}
  .issue-etf{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
  .etf-tag{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border)}
  .issue-links{display:flex;gap:10px;margin-top:5px}
  .issue-links a{font-size:11px;color:var(--text2);text-decoration:none;border-bottom:1px dashed var(--border2)}
  .port-table{width:100%;border-collapse:collapse;font-size:13px}
  .port-table th{text-align:left;padding:7px 10px;color:var(--text2);font-weight:500;border-bottom:0.5px solid var(--border);font-size:11px}
  .port-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
  .port-table tr:last-child td{border-bottom:none}
  .scenario-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px}
  .scenario-badge{min-width:44px;font-size:11px;padding:2px 6px;border-radius:20px;font-weight:600;text-align:center;margin-top:1px}
  .fx-alert{background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:1rem}
  footer{text-align:center;font-size:11px;color:var(--text3);margin-top:2rem;padding-bottom:1rem;line-height:1.8}

  /* ── 편집 UI ── */
  .fab{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:18px;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center}
  .edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
  .edit-overlay.open{display:flex}
  .edit-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:0 16px 36px}
  .edit-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
  .edit-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
  .edit-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .edit-tab.active{background:var(--text);color:var(--bg);border-color:transparent}
  .edit-section{display:none}
  .edit-section.active{display:block}
  .el{font-size:11px;color:var(--text3);font-weight:600;margin:14px 0 4px;letter-spacing:.04em}
  .ei,.es{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg2);color:var(--text);font-family:inherit}
  .et{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg2);color:var(--text);font-family:inherit;resize:vertical;line-height:1.5}
  .eblock{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
  .eblock-title{font-size:13px;font-weight:600;margin-bottom:6px}
  .er2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .edel{float:right;background:var(--red-bg);color:var(--red);border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
  .eadd{width:100%;padding:10px;border:1px dashed var(--border2);border-radius:10px;background:none;color:var(--text2);font-size:13px;cursor:pointer;margin-top:6px}
  .save-btn{width:100%;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:600;margin-top:20px;cursor:pointer}
  .save-btn:disabled{opacity:.5;cursor:not-allowed}
  .smsg{text-align:center;font-size:12px;padding:8px 0;min-height:28px}
  .pw-wrap{padding:24px 0 16px;text-align:center}
  .pw-title{font-size:17px;font-weight:600;margin-bottom:6px}
  .pw-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
  .pw-inp{width:100%;padding:14px;border:1px solid var(--border);border-radius:12px;font-size:20px;text-align:center;letter-spacing:6px;background:var(--bg2);color:var(--text);margin-bottom:10px}
  .pw-btn{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:12px;font-size:15px;cursor:pointer}
  .pw-err{color:var(--red);font-size:12px;margin-top:6px;min-height:18px}
</style>
</head>
<body>
<div class="container" id="app"></div>
<button class="fab" onclick="openEdit()">✏️</button>

<div id="editOverlay" class="edit-overlay" onclick="overlayClick(event)">
  <div class="edit-sheet" id="editSheet">
    <div class="edit-handle"></div>

    <div id="pwScreen" class="pw-wrap">
      <div class="pw-title">🔒 편집 모드</div>
      <div class="pw-sub">비밀번호를 입력하세요</div>
      <input class="pw-inp" type="password" id="pwInput" placeholder="••••" onkeydown="if(event.key==='Enter')checkPw()" />
      <button class="pw-btn" onclick="checkPw()">확인</button>
      <div class="pw-err" id="pwErr"></div>
    </div>

    <div id="tokenScreen" class="pw-wrap" style="display:none">
      <div class="pw-title">🔑 GitHub 토큰 설정</div>
      <div class="pw-sub">저장 기능을 위해 GitHub 토큰을 입력하세요<br>한 번만 입력하면 기억합니다</div>
      <input class="pw-inp" type="password" id="tokenInput" placeholder="ghp_..." style="letter-spacing:1px;font-size:13px" onkeydown="if(event.key==='Enter')saveToken()" />
      <button class="pw-btn" onclick="saveToken()">저장</button>
      <div class="pw-err" id="tokenErr"></div>
    </div>

    <div id="editForm" style="display:none">
      <div class="edit-tabs">
        <button class="edit-tab active" onclick="showTab(0,this)">시황</button>
        <button class="edit-tab" onclick="showTab(1,this)">ETF</button>
        <button class="edit-tab" onclick="showTab(2,this)">이슈</button>
        <button class="edit-tab" onclick="showTab(3,this)">포트</button>
      </div>
      <div id="tabContent"></div>
      <button class="save-btn" id="saveBtn" onclick="saveToGitHub()">💾 저장 및 업로드</button>
      <div class="smsg" id="saveMsg"></div>
    </div>
  </div>
</div>

<script>
const GH_REPO = "cknmi9016-dotcom/motu-dashboard";
const GH_FILE = "kiori.html";
const PW = "kiori";
function getToken(){ return localStorage.getItem('kiori_gh_token')||''; }
function setToken(t){ localStorage.setItem('kiori_gh_token',t); }

/*DATA_START*/
const DATA = {
  "date": "2026.06.15 (월)",
  "phase": "🟢 리스크온 강화 — 키오리 모투",
  "phaseSub": "미·이란 협정 확정 · 나스닥 선물 급등 · 원달러 1,519원 ⚠️ 환율 주의",
  "fxAlert": "⚠️ <strong>환율 경고</strong> — 원달러 1,519원 역대 고점권. SPY·QQQ 신규 매수 시 환차손 리스크 존재. 원달러 1,480원 이하 시 재검토 권고.",
  "portNote": "💡 원달러 고점 → 국내(KODEX 200) 비중 ↑, 달러자산(QQQ·SPY) 비중 ↓ · 현금 30% 눌림목 대기",
  "etfs": [
    {"name":"KODEX 200","index":"코스피200 · 원화","price":"—","chg":"▲ 예상 강세","chgDir":"up","badge":"badge-hold","badgeText":"눌림목 대기","opinion":"협정 확정·리스크온. 삼성·하이닉스 비중 높아 반도체 수혜. 8,000~8,100 눌림목 시 1차 진입 유효."},
    {"name":"KODEX 코스닥150","index":"코스닥150 · 원화","price":"—","chg":"— 변동성 주의","chgDir":"neutral","badge":"badge-wait","badgeText":"관망","opinion":"4종목 중 변동성 최고. 위험선호 장세이나 급등 후 되돌림 위험. 외국인 수급 전환 확인 후 진입."},
    {"name":"SPY","index":"S&P500 · 달러","price":"~$7,431","chg":"▲ 0.50% (전일)","chgDir":"up","badge":"badge-hold","badgeText":"유지 · 신규 자제","opinion":"미국 장세 긍정이나 원달러 고점으로 신규 매수 자제. 기존 보유 시 유지. 환율 개선 시 비중 확대."},
    {"name":"QQQ","index":"나스닥100 · 달러","price":"~$25,888","chg":"▲ 선물 급등 중","chgDir":"up","badge":"badge-hold","badgeText":"유지 · 추격 금지","opinion":"SpaceX·협정 모멘텀. 선물 이미 갭업 → 오늘 추격 매수 비권고. 25,000~25,500 눌림목 시 분할 진입."}
  ],
  "issues": [
    {"color":"green","title":"🟢 미·이란 협정 6/14 서명 확정","tags":"KODEX 200 ↑, 코스닥150 ↑, QQQ ↑, SPY ↑","impact":"전 지수 리스크온. WTI -5.59% → 인플레 완화 기대 → 4종목 전체 긍정. 단, 이미 선반영 — 갭업 추격 금지.","links":"📰 CNBC|https://www.cnbc.com/2026/06/14/us-iran-war-peace-deal.html\n📓 매매일지|https://app.notion.com/p/3802732a5a1f816c9de4d00a143a3ccf"},
    {"color":"green","title":"🟢 SpaceX 나스닥 상장 +19%","tags":"QQQ ↑↑, SPY ↑","impact":"나스닥 모멘텀 강화. QQQ 보유 근거 확인. 그러나 오늘 선물 이미 갭업 — 25,000~25,500 눌림목 대기.","links":"📰 TheStreet|https://www.thestreet.com/stock-market-today/stock-market-today-dow-jones-sp-500-nasdaq-updates-june-12-2026"},
    {"color":"red","title":"🔴 미국 5월 CPI 3년 최대 상승","tags":"QQQ ↓↓, SPY ↓","impact":"금리 인하 2027년까지 지연 → QQQ 고밸류 압박 지속. 나스닥 급등 후 급락 패턴 반복 위험. QQQ 비중 30% 이내 유지.","links":""},
    {"color":"amber","title":"🟡 원달러 1,519원 — 역대 고점","tags":"SPY 환차손, QQQ 환차손, KODEX 200 중립","impact":"지수 +1% 상승해도 환율 되돌림 시 원화 손실 가능. 1,480원 이하 전까지 SPY·QQQ 신규 매수 자제. 국내 ETF 상대적으로 유리.","links":""},
    {"color":"blue","title":"🔵 반도체 강세 (INTC▲6.5% AMD▲4.7%)","tags":"KODEX 200 ↑, QQQ ↑","impact":"KODEX 200 내 삼성전자·SK하이닉스 비중 수혜. QQQ도 반도체 편입 비중 큼. 반도체 사이클 상승 지속 시 두 ETF 모두 긍정.","links":""}
  ],
  "portfolio": [
    {"name":"KODEX 200","weight":"30%","amount":"1.5억","badge":"badge-hold","badgeText":"안정"},
    {"name":"코스닥150","weight":"10%","amount":"0.5억","badge":"badge-wait","badgeText":"공격·소량"},
    {"name":"QQQ","weight":"25%","amount":"1.25억","badge":"badge-hold","badgeText":"공격·달러"},
    {"name":"SPY","weight":"5%","amount":"0.25억","badge":"badge-hold","badgeText":"안정·달러"},
    {"name":"현금","weight":"30%","amount":"1.5억","badge":"badge-cash","badgeText":"실탄 유보"}
  ]
};
/*DATA_END*/

// ── 렌더 ──
const CV = {green:'--green',red:'--red',amber:'--amber',blue:'--blue'};

function render() {
  const {date,phase,phaseSub,fxAlert,portNote,etfs,issues,portfolio} = DATA;

  const etfCards = etfs.map(e=>`
    <div class="etf-card">
      <div class="etf-name">${e.name}</div>
      <div class="etf-index">${e.index}</div>
      <div class="etf-price">${e.price}</div>
      <div class="etf-chg ${e.chgDir}">${e.chg}</div>
      <div class="etf-action"><span class="badge ${e.badge}">${e.badgeText}</span></div>
      <div class="etf-opinion">${e.opinion}</div>
    </div>`).join('');

  const issueCards = issues.map(iss=>{
    const tags = iss.tags.split(',').map(t=>`<span class="etf-tag">${t.trim()}</span>`).join('');
    const links = iss.links ? iss.links.split('\n').filter(Boolean).map(l=>{
      const [txt,url] = l.split('|'); return url?`<a href="${url}" target="_blank">${txt}</a>`:'';
    }).join('') : '';
    return `
      <div class="issue-card" style="border-left-color:var(${CV[iss.color]||'--text'})">
        <div class="issue-title">${iss.title}</div>
        <div class="issue-etf">${tags}</div>
        <div class="issue-impact">${iss.impact}</div>
        ${links?`<div class="issue-links">${links}</div>`:''}
      </div>`;
  }).join('');

  const portRows = portfolio.map((p,i)=>{
    const cash = p.badge==='badge-cash';
    const last = i===portfolio.length-1;
    return `<tr${last?' style="background:var(--bg2)"':''}>
      <td><strong>${p.name}</strong></td>
      <td><span style="color:var(${cash?'--blue':'--red'});font-weight:500">${p.weight}</span></td>
      <td${cash?' style="color:var(--blue);font-weight:500"':''}>${p.amount}</td>
      <td><span class="badge ${p.badge}">${p.badgeText}</span></td>
      <td style="color:var(--text3)">—</td><td style="color:var(--text3)">—</td>
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="top-banner">
      <div>
        <div class="phase">${phase}</div>
        <div class="phase-sub">${phaseSub}</div>
      </div>
      <div class="update-info">
        <div>${date}</div>
        <div style="color:var(--text3);margin-top:2px">6/15 ~ 9/30 · 시드 5억</div>
      </div>
    </div>

    <div class="fx-alert">${fxAlert}</div>

    <div class="section-label">키오리 매매 가능 4종목</div>
    <div class="etf-grid">${etfCards}</div>

    <div class="grid2">
      <div>
        <div class="section-label">4종목 관련 핵심 이슈</div>
        ${issueCards}
      </div>
      <div>
        <div class="section-label">오늘 권장 배분 (시드 5억)</div>
        <div class="card" style="padding:0">
          <table class="port-table">
            <thead><tr><th>종목</th><th>비중</th><th>금액</th><th>성격</th><th>매수가</th><th>수익률</th></tr></thead>
            <tbody>${portRows}</tbody>
          </table>
          <div style="padding:8px 14px;font-size:11px;color:var(--amber);border-top:0.5px solid var(--border)">${portNote}</div>
        </div>

        <div class="section-label">매수 시나리오</div>
        <div class="card">
          <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px">🇰🇷 국내 ETF</div>
          <div class="scenario-row">
            <span class="scenario-badge" style="background:var(--green-bg);color:var(--green)">1차</span>
            <div><div style="font-weight:500;font-size:13px">코스피 8,000~8,100 눌림목</div><div style="font-size:11px;color:var(--text2)">KODEX 200 — 현금 15% 투입 (7,500만)</div></div>
          </div>
          <div class="scenario-row" style="margin-bottom:14px">
            <span class="scenario-badge" style="background:var(--amber-bg);color:var(--amber)">2차</span>
            <div><div style="font-weight:500;font-size:13px">외국인 수급 전환 신호</div><div style="font-size:11px;color:var(--text2)">코스닥150 소량 추가 — 5% (2,500만)</div></div>

// ── 편집 UI ──
let unlocked = false;
let curTab = 0;

function openEdit() {
  document.getElementById('editOverlay').classList.add('open');
  if (!unlocked) {
    document.getElementById('pwScreen').style.display='';
    document.getElementById('editForm').style.display='none';
    setTimeout(()=>document.getElementById('pwInput').focus(),200);
  } else {
    showEditForm();
  }
}
function overlayClick(e){ if(e.target.id==='editOverlay') closeEdit(); }
function closeEdit(){ document.getElementById('editOverlay').classList.remove('open'); }

function checkPw(){
  if(document.getElementById('pwInput').value===PW){
    unlocked=true;
    document.getElementById('pwScreen').style.display='none';
    if(!getToken()){
      document.getElementById('tokenScreen').style.display='';
      setTimeout(()=>document.getElementById('tokenInput').focus(),200);
    } else {
      showEditForm();
    }
  } else {
    document.getElementById('pwErr').textContent='비밀번호가 틀렸습니다';
    document.getElementById('pwInput').value='';
  }
}
function saveToken(){
  const t=document.getElementById('tokenInput').value.trim();
  if(!t.startsWith('ghp_')&&!t.startsWith('github_pat_')){
    document.getElementById('tokenErr').textContent='올바른 GitHub 토큰을 입력하세요'; return;
  }
  setToken(t);
  document.getElementById('tokenScreen').style.display='none';
  showEditForm();
}

function showEditForm(){
  document.getElementById('editForm').style.display='';
  buildTab(curTab);
}

function showTab(idx,btn){
  collect();
  curTab=idx;
  document.querySelectorAll('.edit-tab').forEach((b,i)=>b.classList.toggle('active',i===idx));
  buildTab(idx);
}

function buildTab(idx){
  const el=document.getElementById('tabContent');
  if(idx===0) el.innerHTML=tabSiwang();
  else if(idx===1) el.innerHTML=tabEtf();
  else if(idx===2) el.innerHTML=tabIssue();
  else el.innerHTML=tabPort();
}

function e(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tabSiwang(){return`
  <div class="el">날짜</div><input class="ei" id="f-date" value="${e(DATA.date)}"/>
  <div class="el">시황 제목</div><input class="ei" id="f-phase" value="${e(DATA.phase)}"/>
  <div class="el">시황 부제</div><textarea class="et" id="f-phaseSub" rows="2">${e(DATA.phaseSub)}</textarea>
  <div class="el">환율 경고 (HTML 가능)</div><textarea class="et" id="f-fxAlert" rows="3">${e(DATA.fxAlert)}</textarea>
  <div class="el">포트 안내 메모</div><textarea class="et" id="f-portNote" rows="2">${e(DATA.portNote)}</textarea>`;}

const BADGES=[['badge-buy','매수'],['badge-hold','유지/대기'],['badge-wait','관망'],['badge-cash','현금']];
const DIRS=['up','dn','neutral'];
function bOpts(cur){ return BADGES.map(([v,t])=>`<option value="${v}"${cur===v?' selected':''}>${t}</option>`).join(''); }
function dOpts(cur){ return DIRS.map(d=>`<option value="${d}"${cur===d?' selected':''}>${d}</option>`).join(''); }

function tabEtf(){
  return DATA.etfs.map((e2,i)=>`
    <div class="eblock">
      <div class="eblock-title">${e2.name}</div>
      <div class="er2">
        <div><div class="el">가격</div><input class="ei" id="etf${i}price" value="${e(e2.price)}"/></div>
        <div><div class="el">방향</div><select class="es" id="etf${i}dir">${dOpts(e2.chgDir)}</select></div>
      </div>
      <div class="el">등락 텍스트</div><input class="ei" id="etf${i}chg" value="${e(e2.chg)}"/>
      <div class="er2">
        <div><div class="el">배지</div><select class="es" id="etf${i}badge">${bOpts(e2.badge)}</select></div>
        <div><div class="el">배지 텍스트</div><input class="ei" id="etf${i}bt" value="${e(e2.badgeText)}"/></div>
      </div>
      <div class="el">의견</div><textarea class="et" id="etf${i}op" rows="3">${e(e2.opinion)}</textarea>
    </div>`).join('');}

const COLS=['green','red','amber','blue'];
function cOpts(cur){ return COLS.map(c=>`<option value="${c}"${cur===c?' selected':''}>${c}</option>`).join(''); }

function tabIssue(){
  return DATA.issues.map((iss,i)=>`
    <div class="eblock">
      <button class="edel" onclick="delIssue(${i})">삭제</button>
      <div class="er2">
        <div><div class="el">색상</div><select class="es" id="iss${i}col">${cOpts(iss.color)}</select></div>
        <div><div class="el">제목</div><input class="ei" id="iss${i}tit" value="${e(iss.title)}"/></div>
      </div>
      <div class="el">태그 (쉼표 구분)</div><input class="ei" id="iss${i}tags" value="${e(iss.tags)}"/>
      <div class="el">내용</div><textarea class="et" id="iss${i}imp" rows="3">${e(iss.impact)}</textarea>
      <div class="el">링크 (한 줄에 하나, 형식: 텍스트|URL)</div><textarea class="et" id="iss${i}lnk" rows="2">${e(iss.links)}</textarea>
    </div>`).join('')
    + `<button class="eadd" onclick="addIssue()">＋ 이슈 추가</button>`;}

function tabPort(){
  return DATA.portfolio.map((p,i)=>`
    <div class="eblock">
      <div class="eblock-title">${p.name}</div>
      <div class="er2">
        <div><div class="el">비중</div><input class="ei" id="pt${i}w" value="${e(p.weight)}"/></div>
        <div><div class="el">금액</div><input class="ei" id="pt${i}a" value="${e(p.amount)}"/></div>
      </div>
      <div class="er2">
        <div><div class="el">배지</div><select class="es" id="pt${i}b">${bOpts(p.badge)}</select></div>
        <div><div class="el">배지 텍스트</div><input class="ei" id="pt${i}bt" value="${e(p.badgeText)}"/></div>
      </div>
    </div>`).join('')
    + `<button class="eadd" style="margin-top:16px;border-color:var(--red);color:var(--red)" onclick="resetToken()">🔑 GitHub 토큰 재설정</button>`;}

function resetToken(){
  localStorage.removeItem('kiori_gh_token');
  closeEdit();
  setTimeout(()=>{ unlocked=false; openEdit(); },200);
}

function collect(){
  if(document.getElementById('f-date')){
    DATA.date=document.getElementById('f-date').value;
    DATA.phase=document.getElementById('f-phase').value;
    DATA.phaseSub=document.getElementById('f-phaseSub').value;
    DATA.fxAlert=document.getElementById('f-fxAlert').value;
    DATA.portNote=document.getElementById('f-portNote').value;
  }
  DATA.etfs.forEach((et,i)=>{
    if(document.getElementById(`etf${i}price`)){
      et.price=document.getElementById(`etf${i}price`).value;
      et.chg=document.getElementById(`etf${i}chg`).value;
      et.chgDir=document.getElementById(`etf${i}dir`).value;
      et.badge=document.getElementById(`etf${i}badge`).value;
      et.badgeText=document.getElementById(`etf${i}bt`).value;
      et.opinion=document.getElementById(`etf${i}op`).value;
    }
  });
  DATA.issues.forEach((iss,i)=>{
    if(document.getElementById(`iss${i}tit`)){
      iss.color=document.getElementById(`iss${i}col`).value;
      iss.title=document.getElementById(`iss${i}tit`).value;
      iss.tags=document.getElementById(`iss${i}tags`).value;
      iss.impact=document.getElementById(`iss${i}imp`).value;
      iss.links=document.getElementById(`iss${i}lnk`).value;
    }
  });
  DATA.portfolio.forEach((p,i)=>{
    if(document.getElementById(`pt${i}w`)){
      p.weight=document.getElementById(`pt${i}w`).value;
      p.amount=document.getElementById(`pt${i}a`).value;
      p.badge=document.getElementById(`pt${i}b`).value;
      p.badgeText=document.getElementById(`pt${i}bt`).value;
    }
  });
}

function delIssue(i){
  collect();
  DATA.issues.splice(i,1);
  document.getElementById('tabContent').innerHTML=tabIssue();
}
function addIssue(){
  collect();
  DATA.issues.push({color:'green',title:'🟢 새 이슈',tags:'',impact:'',links:''});
  document.getElementById('tabContent').innerHTML=tabIssue();
  document.getElementById('editSheet').scrollTop=9999;
}

// ── GitHub 저장 ──
function toB64(str){
  const bytes=new TextEncoder().encode(str);
  let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function fromB64(b64){
  const bin=atob(b64.replace(/\s/g,''));
  return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0)));
}

async function saveToGitHub(){
  collect();
  render();
  const btn=document.getElementById('saveBtn');
  const msg=document.getElementById('saveMsg');
  btn.disabled=true; msg.style.color=''; msg.textContent='⏳ GitHub에 업로드 중...';
  try{
    const tok=getToken();
    if(!tok) throw new Error('토큰이 없습니다. 토큰을 재설정해주세요.');
    const getRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{
      headers:{Authorization:`token ${tok}`,'User-Agent':'kiori-editor'}});
    if(!getRes.ok) throw new Error('파일 조회 실패 '+getRes.status);
    const getJson=await getRes.json();
    const sha=getJson.sha;
    const cur=fromB64(getJson.content);

    const newBlock=`/*DATA_START*/\nconst DATA = ${JSON.stringify(DATA,null,2)};\n/*DATA_END*/`;
    const newHtml=cur.replace(/\/\*DATA_START\*\/[\s\S]*?\/\*DATA_END\*\//,newBlock);
    if(newHtml===cur) throw new Error('DATA 블록을 찾지 못했습니다');

    const putRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{
      method:'PUT',
      headers:{Authorization:`token ${tok}`,'Content-Type':'application/json','User-Agent':'kiori-editor'},
      body:JSON.stringify({message:`Update kiori dashboard ${DATA.date}`,content:toB64(newHtml),sha})});
    if(!putRes.ok){const j=await putRes.json();throw new Error(j.message||'업로드 실패');}

    msg.style.color='var(--green)'; msg.textContent='✅ 저장 완료! 잠시 후 반영됩니다.';
    setTimeout(closeEdit,2000);
  }catch(err){
    msg.style.color='var(--red)'; msg.textContent='❌ '+err.message;
  }finally{btn.disabled=false;}
}

render();
</script>
